name: Release and Tagging

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get Version from package.json
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Tag Exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.pkg_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract Changelog Entry
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog_reader
        run: |
          VERSION_ESCAPED=$(echo "${{ steps.pkg_version.outputs.VERSION }}" | sed 's/v//' | sed 's/\./\\./g')
          BODY=$(sed -n "/## \[$VERSION_ESCAPED\]/,/## \[/p" CHANGELOG.md | sed '1d;$d')

          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg_version.outputs.VERSION }}
          name: Release ${{ steps.pkg_version.outputs.VERSION }}
          body: ${{ steps.changelog_reader.outputs.BODY }}
          draft: false
          prerelease: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
